<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 300px;
        padding: 20px;
        font-family: Arial, sans-serif;
        background: #1a1a2e;
        color: #eee;
      }

      h2 {
        margin: 0 0 6px;
        font-size: 16px;
        color: #00d4ff;
      }

      p {
        font-size: 12px;
        color: #aaa;
        margin: 0 0 16px;
      }

      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        margin-bottom: 10px;
      }

      #newSessionBtn {
        background: #00d4ff;
        color: #000;
        font-weight: bold;
      }

      #newSessionBtn:disabled {
        background: #555;
        color: #999;
        cursor: not-allowed;
      }

      #status {
        font-size: 12px;
        text-align: center;
        color: #aaa;
        min-height: 18px;
      }

      #sessionInfo {
        display: none;
        background: #0f3460;
        border-radius: 6px;
        padding: 10px;
        margin-top: 10px;
        font-size: 12px;
      }

      #shareUrl {
        word-break: break-all;
        color: #00d4ff;
        margin-bottom: 8px;
      }

      #copyBtn {
        background: #e94560;
        color: #fff;
        font-size: 12px;
        padding: 6px;
      }
    </style>
  </head>
  <body>
    <h2>🔒 Disposable Browser</h2>
    <p>Launch an isolated, shareable browser session</p>

    <button id="newSessionBtn">🚀 New Session</button>
    <div id="status"></div>

    <div id="sessionInfo">
      <div id="shareUrl"></div>
      <button id="copyBtn">📋 Copy Share Link</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
